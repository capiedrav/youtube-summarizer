services:
  web:
    build: .

    volumes:
      - db-volume-staging:/app/db # this volume is shared with celery container
      - files-volume-staging:/app/nginx # this volume is shared with nginx and celery containers
      - logs-volume-staging:/app/logs # this volume is shared with celery container

    env_file: "./.env-staging"

    depends_on:
      - redis

    networks:
      - yt-summarizer-network

    command: >
      sh -c "python manage.py migrate &&
             # collect static files (creates STATIC_ROOT path if not already exits)
             python manage.py collectstatic --no-input &&
             # create folder for media files if not already exist
             mkdir -p /app/nginx/media/thumbnails &&
             # start django app 
             gunicorn -c ./project_config/gunicorn.py"

    restart: unless-stopped

    container_name: yt-summarizer-staging

  nginx:
    build: ./nginx

    volumes:
      # this volume is shared with django container (read-only)
      - files-volume-staging:/usr/share/nginx/html:ro

    depends_on:
      - web

    networks:
      - yt-summarizer-network

    restart: unless-stopped

    container_name: yt-summarizer-nginx-staging

  redis:
    image: redis:7.0.11-alpine

    networks:
      - yt-summarizer-network

    container_name: redis-cntr

  celery:
    build: . # uses the same Dockerfile as web service

    volumes: # uses the same volumes as web service
      - db-volume-staging:/app/db
      - files-volume-staging:/app/nginx
      - logs-volume-staging:/app/logs

    env_file:
      - "./.env-staging"

    command: |
      celery -A project_config.celery worker -l INFO

    depends_on:
      - redis

    networks:
      - yt-summarizer-network

    container_name: celery-cntr

  cloudflare_tunnel:
    image: cloudflare/cloudflared:1449-569a7c3c9ed0

    env_file: "./.env-staging"

    command: tunnel --no-autoupdate run

    networks:
      - yt-summarizer-network

    restart: unless-stopped

    container_name: yt-summarizer-cf-tunnel-staging

volumes:
  db-volume-staging:
  files-volume-staging:
  logs-volume-staging:

networks:
  yt-summarizer-network:
    name: yt-summarizer-network
    external: false
