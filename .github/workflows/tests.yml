# workflow to run tests before accepting pull requests in main branch

name: Run Tests

on: [pull_request, workflow_dispatch]

jobs:
  
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: checkout repository
        uses: actions/checkout@v5.0.0

      - name: run actionlint
        uses: devops-actions/actionlint@v0.1.9
        
      - name: create .env file for docker compose
        run: |
          echo "DEEPSEEK_API_KEY=${{secrets.DEEPSEEK_API_KEY}}" > .env-staging
          echo "DJANGO_SECRET_KEY=${{secrets.DJANGO_SECRET_KEY}}" >> .env-staging          
                      
      - name: Run unit tests
        run: docker compose run --rm web sh -c "python manage.py test -b"
        