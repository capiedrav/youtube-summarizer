# workflow to run ci tests before accepting pull requests in main branch

name: CI

on:
  # this workflow runs on pull_request/push to main branch or workflow_dispatch in any branch
  pull_request:
    branches: [main]
  push:
    branches: [main]

  workflow_dispatch:

concurrency: # abort jobs if new code arrives to the same pull request
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: create logs folder
        run: |
          mkdir -p logs
          chmod -R 777 logs

      - name: run actionlint
        uses: devops-actions/actionlint@9fb9c192862f19e684586ca84b500461bcd8a541 #v0.1.12
        
      - name: create .env file for docker compose
        run: |
          echo "DEEPSEEK_API_KEY=${{secrets.DEEPSEEK_API_KEY}}" > .env
          echo "DJANGO_SECRET_KEY=${{secrets.DJANGO_SECRET_KEY}}" >> .env
                      
      - name: Run unit tests
        run: docker compose run --rm web sh -c "python manage.py test -b"

      - name: upload artifact
        if: github.ref == 'refs/heads/main' # only runs in main branch
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact
          path: | # include all files except .env file
            .
            !.env
          retention-days: 1
          overwrite: true

  build-image:
    runs-on: ubuntu-latest
    needs: [unit-tests] # unit tests must pass
    if: github.ref == 'refs/heads/main' # only in main branch
    steps:
      - name: download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: artifact
          path: .

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 #v4.1.0

      - name: log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee #v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: get tags for docker image
        id: short_sha
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/yt-summarizer
          tags: |
            # automatically outputs standard 7-char short SHA from commit
            type=sha 
            type=raw,value=latest

      - name: build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf #v7.2.0
        with:
          context: .
          push: true
          tags: |
            ${{ steps.short_sha.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

        