# workflow to run ci tests before accepting pull requests in main branch

name: CI

on:
  # this workflow runs on pull request to main branch or workflow_dispatch in any branch
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: checkout repository
        uses: actions/checkout@v5.0.0

      - name: create logs folder
        run: |
          mkdir -p logs
          chmod -R 777 logs

      - name: run actionlint
        uses: devops-actions/actionlint@v0.1.9
        
      - name: create .env file for docker compose
        run: |
          echo "DEEPSEEK_API_KEY=${{secrets.DEEPSEEK_API_KEY}}" > .env
          echo "DJANGO_SECRET_KEY=${{secrets.DJANGO_SECRET_KEY}}" >> .env
                      
      - name: Run unit tests
        run: docker compose run --rm web sh -c "python manage.py test -b"

      - name: upload artifact
        if: github.ref == 'refs/heads/main' # only runs in main branch
        uses: actions/upload-artifact@v4.0.0
        with:
          name: artifact
          path: | # include all files except .env file
            .
            !.env
          retention-days: 1

  build-image:
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: github.ref == 'refs/heads/main' # only runs in main branch
    steps:
      - name: download artifact
        uses: actions/download-artifact@v4.0.0
        with:
          name: artifact
          path: .

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: get tags for docker image
        id: short_sha
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/yt-summarizer
          tags: |
            type=sha # automatically outputs standard 7-char short SHA from commit
            type=raw,value=latest

      - name: build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.short_sha.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

        